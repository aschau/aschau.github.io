name: Fetch Misery Index Data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Restore previous data
        run: |
          git fetch origin misery-data 2>/dev/null && \
            git show origin/misery-data:current.json > tools/misery-index/data/current.json || \
            echo '{"history":[]}' > tools/misery-index/data/current.json

      - name: Fetch misery data
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
        run: node .github/scripts/fetch-misery-data.js

      - name: Validate data before pushing
        id: validate
        run: |
          POSTS=$(python3 -c "import json; d=json.load(open('tools/misery-index/data/current.json')); print(d.get('social',{}).get('recentPosts',0))" 2>/dev/null || echo "0")
          STATUS=$(python3 -c "import json; d=json.load(open('tools/misery-index/data/current.json')); print(d.get('status',{}).get('status',{}).get('indicator','unknown'))" 2>/dev/null || echo "unknown")
          if [ "$POSTS" = "0" ] && [ "$STATUS" = "unknown" ]; then
            echo "Both Bluesky and status fetches failed — skipping push"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push to data branch
        if: steps.validate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          cp tools/misery-index/data/current.json /tmp/current.json
          cp tools/misery-index/data/feed.xml /tmp/feed.xml 2>/dev/null || true
          cp tools/misery-index/data/feed-official.xml /tmp/feed-official.xml 2>/dev/null || true

          git checkout --orphan misery-data
          git rm -rf .
          cp /tmp/current.json current.json
          [ -f /tmp/feed.xml ] && cp /tmp/feed.xml feed.xml
          [ -f /tmp/feed-official.xml ] && cp /tmp/feed-official.xml feed-official.xml
          git add current.json
          git add feed.xml 2>/dev/null || true
          git add feed-official.xml 2>/dev/null || true
          MISERY=$(python3 -c "import json; print(json.load(open('current.json'))['miseryIndex'])" 2>/dev/null || echo "?")
          POSTS=$(python3 -c "import json; print(json.load(open('current.json')).get('social',{}).get('recentPosts',0))" 2>/dev/null || echo "?")
          STATUS=$(python3 -c "import json; print(json.load(open('current.json')).get('status',{}).get('status',{}).get('description','unknown'))" 2>/dev/null || echo "?")
          git commit -m "misery: ${MISERY}/10 | ${STATUS} | ${POSTS} bluesky posts (status.claude.com + bsky)"
          git push origin misery-data --force
