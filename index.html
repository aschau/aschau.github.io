<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting to www.raggedydoc.com</title>
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://www.raggedydoc.com/">
  <meta http-equiv="refresh" content="0; url=https://www.raggedydoc.com/">
  <script>
    var dest = "https://www.raggedydoc.com" + window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(dest);
  </script>
</head>
<body>
  <p>This site has moved to <a href="https://www.raggedydoc.com/">www.raggedydoc.com</a>.</p>
</body>
</html>
