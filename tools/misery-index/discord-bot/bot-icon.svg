<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1028"/>
    </linearGradient>
    <linearGradient id="gaugeTrack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e3a"/>
      <stop offset="100%" stop-color="#2a2a4a"/>
    </linearGradient>
    <linearGradient id="gaugeFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="30%" stop-color="#eab308"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="80%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="robotBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a5c"/>
      <stop offset="100%" stop-color="#2a2a44"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="eyeGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Gauge arc — track -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="url(#gaugeTrack)" stroke-width="20"
    stroke-dasharray="660" stroke-dashoffset="165" stroke-linecap="round"
    transform="rotate(135 256 220)"/>

  <!-- Gauge arc — colored fill -->
  <circle cx="256" cy="220" r="140" fill="none" stroke="url(#gaugeFill)" stroke-width="20"
    stroke-dasharray="660" stroke-dashoffset="264" stroke-linecap="round"
    transform="rotate(135 256 220)" filter="url(#glow)"/>

  <!-- Tick marks -->
  <g stroke="#6a6a8a" stroke-width="2" stroke-linecap="round">
    <line x1="256" y1="72" x2="256" y2="88" transform="rotate(-135 256 220)"/>
    <line x1="256" y1="72" x2="256" y2="85" transform="rotate(-90 256 220)"/>
    <line x1="256" y1="72" x2="256" y2="88" transform="rotate(-45 256 220)"/>
    <line x1="256" y1="72" x2="256" y2="85" transform="rotate(0 256 220)"/>
    <line x1="256" y1="72" x2="256" y2="88" transform="rotate(45 256 220)"/>
    <line x1="256" y1="72" x2="256" y2="85" transform="rotate(90 256 220)"/>
    <line x1="256" y1="72" x2="256" y2="88" transform="rotate(135 256 220)"/>
  </g>

  <!-- Needle -->
  <g transform="rotate(75 256 220)">
    <polygon points="253,224 259,224 257,98 255,98" fill="#e2e8f0" filter="url(#glow)"/>
  </g>
  <circle cx="256" cy="220" r="7" fill="#2a2a4a" stroke="#4a4a6a" stroke-width="2"/>

  <!-- Robot head -->
  <rect x="192" y="320" width="128" height="110" rx="20" fill="url(#robotBody)" stroke="#4a4a6a" stroke-width="2"/>

  <!-- Antenna -->
  <line x1="256" y1="320" x2="256" y2="296" stroke="#6a6a8a" stroke-width="3" stroke-linecap="round"/>
  <circle cx="256" cy="290" r="6" fill="#a855f7" filter="url(#eyeGlow)"/>

  <!-- Eyes — glowing purple, slightly worried expression -->
  <rect x="214" y="350" width="30" height="20" rx="6" fill="#0f0f1a" stroke="#4a4a6a" stroke-width="1"/>
  <rect x="268" y="350" width="30" height="20" rx="6" fill="#0f0f1a" stroke="#4a4a6a" stroke-width="1"/>
  <circle cx="229" cy="360" r="7" fill="#a855f7" filter="url(#eyeGlow)"/>
  <circle cx="283" cy="360" r="7" fill="#a855f7" filter="url(#eyeGlow)"/>
  <circle cx="229" cy="359" r="3" fill="#e9d5ff"/>
  <circle cx="283" cy="359" r="3" fill="#e9d5ff"/>

  <!-- Mouth — worried zigzag -->
  <polyline points="222,400 236,394 250,402 264,394 278,400 292,394"
    fill="none" stroke="#a855f7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

  <!-- Ear bolts -->
  <circle cx="186" cy="370" r="8" fill="#2a2a44" stroke="#4a4a6a" stroke-width="2"/>
  <circle cx="326" cy="370" r="8" fill="#2a2a44" stroke="#4a4a6a" stroke-width="2"/>

  <!-- Score -->
  <text x="256" y="255" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-weight="800" font-size="36" fill="#f0f0f0" letter-spacing="-1">8.5</text>

  <!-- Label -->
  <text x="256" y="462" text-anchor="middle" font-family="'SF Pro Display', 'Inter', system-ui, sans-serif" font-weight="700" font-size="11" fill="#8b8ba0" letter-spacing="3">MISERY INDEX</text>
</svg>
