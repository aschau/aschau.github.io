<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Andrew Steven Chau | Senior Software Engineer & Game Developer</title>
  <link rel="stylesheet" href="css/arcade.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous">
</head>
<body>

<div class="lightbox" id="lightbox" onclick="this.classList.remove('open')"><img id="lightbox-img" src="" alt=""></div>

<div class="load-screen" id="load-screen">
  <div class="load-sprite"></div>
  <div class="load-text">LOADING</div>
  <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
  <div class="load-hint">Preparing the arcade...</div>
</div>

<div class="layout">
  <!-- ARCADE SCREEN -->
  <div class="screen-bezel">
    <div class="bezel-corner tl"></div><div class="bezel-corner tr"></div>
    <div class="bezel-corner bl"></div><div class="bezel-corner br"></div>
    <div class="bezel-label">raggedydoc &middot; model asc-2026</div>
    <div class="screen-ambient" id="screen-ambient"></div>
    <div class="screen-pattern" id="screen-pattern"></div>
    <div class="screen-static"></div>
    <div class="screen-flicker"></div>
    <div class="content-area">
    <div class="panel active" id="section-content"></div>
    </div><!-- /content-area -->
  </div><!-- /screen-bezel -->

  <!-- GAME WORLD (bottom strip) -->
  <div class="world">
    <div class="sky"></div>
    <div class="stars" id="stars"></div>
    <div class="ground"><div class="ground-grid"></div></div>
    <div class="character idle" id="character"></div>
    <div class="world-strip" id="world-strip">
      <div class="cabinet active" data-id="home" style="--cc:var(--blue-light);"><div class="cab-screen"><div class="cab-icon">&#9670;</div></div><div class="cab-glow"></div><div class="cab-base"></div><div class="cab-label">Home</div></div>
      <div class="cabinet" data-id="about" style="--cc:var(--green);"><div class="cab-screen"><div class="cab-icon">&#9786;</div></div><div class="cab-glow"></div><div class="cab-base"></div><div class="cab-label">About</div></div>
      <div class="cabinet" data-id="journey" style="--cc:var(--teal);"><div class="cab-screen"><div class="cab-icon">&#9654;</div></div><div class="cab-glow"></div><div class="cab-base"></div><div class="cab-label">Journey</div></div>
      <div class="cabinet" data-id="work" style="--cc:var(--orange);"><div class="cab-screen"><div class="cab-icon">&#9733;</div></div><div class="cab-glow"></div><div class="cab-base"></div><div class="cab-label">Work</div></div>
      <div class="cabinet" data-id="personal" style="--cc:var(--pink);"><div class="cab-screen"><div class="cab-icon">&#9829;</div></div><div class="cab-glow"></div><div class="cab-base"></div><div class="cab-label">Personal</div></div>
      <div class="cabinet" data-id="play" style="--cc:var(--purple);"><div class="cab-screen"><div class="cab-icon">&#9684;</div></div><div class="cab-glow"></div><div class="cab-base"></div><div class="cab-label">Play</div></div>
    </div>

  </div>

  <!-- Content sprite (moves up from world into card area) -->
  <div class="content-sprite idle" id="content-sprite"></div>

  <!-- CONTROL PANEL -->
  <div class="controls">
    <div class="ctrl-section">
      <button class="ctrl-btn" id="ctrl-up">&#9650;</button>
      <button class="ctrl-btn" id="ctrl-down">&#9660;</button>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-section">
      <button class="ctrl-btn" id="ctrl-left">&#9664;</button>
      <button class="ctrl-btn" id="ctrl-right">&#9654;</button>
    </div>
    <div class="ctrl-sep"></div>
    <div class="ctrl-section">
      <button class="ctrl-btn" id="ctrl-action" style="border-radius:50%;width:42px;height:42px;font-family:'Silkscreen',cursive;font-size:0.6rem;border-color:rgba(155,109,255,0.3);color:rgba(155,109,255,0.5);" title="Space to flip">FLIP</button>
    </div>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label" id="ctrl-mode-label">WORLD</span>
    <div class="ctrl-sep"></div>
    <span class="ctrl-label" style="opacity:0.3;">SPACE/ENTER=FLIP &middot; ARROWS=MOVE &middot; UP/DOWN=LAYER</span>
  </div>
</div>

<script src="js/arcade.js"></script>

</body>
</html>
