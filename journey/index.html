    <h1>Andrew Steven Chau — Career Journey</h1>
    <h2>UC Irvine (2013-2017)</h2>
    <p>B.S. Computer Game Science. Built award-winning games in Python and Unity.</p>
    <h2>Super Toy Box (2016-2017)</h2>
    <p>Client Developer. Built the Subaru Wheelstand showroom app and VR Factory.</p>
    <h2>Sega Atlus (2016-2020)</h2>
    <p>QA Tester. Tested Persona 5 Royal, Yakuza 5 Remastered, Catherine: Full Body, Yakuza 0.</p>
    <h2>Trigger Global (2018-2019)</h2>
    <p>AR Developer. Shipped AR experiences for the NBA, NHL, NFL. Deployed on-site at stadiums with Intel.</p>
    <h2>MobilityWare (2020-2025)</h2>
    <p>Software Engineer II. Supported 30+ shipped titles. Led studio-wide privacy and compliance initiatives.</p>
    <h2>Waxheart (2024-Present)</h2>
    <p>DevOps Engineer / Technical Producer. Built Jenkins CI/CD, QA department, Discord bot from scratch.</p>
    <h2>Friend Castle (2023-Present)</h2>
    <p>Co-Founder. Indie game studio LLC handling design, engineering, production, and publishing.</p>
    <h2>Blizzard Entertainment (2025-Present)</h2>
    <p>Senior Software Engineer. Hearthstone Client Team. Managing SDKs and modernizing platform support.</p>
