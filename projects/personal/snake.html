<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="../../css/stylesheet.css">
    <title>Andrew Chau | Portfolio</title>

    <style>
      input, textarea { border: 1px solid #CCC; margin: 0px; padding: 0px; }
      #ip { line-height: 20px; }
      #port { line-height: 20px; }
      #ID { line-height: 20px; }
      #log { width: 100%; max-width: 900px; height: 200px; }
      #message { width: 100%; line-height: 20px; }
      canvas {
        display: block;
        border: 1px solid #555;
        margin: auto;
      }
      .snake-controls label { color: #ccc; margin-right: 5px; }
      .snake-controls input[type="text"] { background: #222; color: #fff; border: 1px solid #555; padding: 2px 6px; }
      .snake-controls textarea { background: #222; color: #0f0; font-family: monospace; }
      .snake-controls table { width: 70%; margin: auto; color: #fff; }
      .snake-controls td { padding: 4px 8px; }
    </style>

    <!-- Snake.js = Game -->
    <script src="snake.js"></script>

    <!-- jQuery for websocket UI -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js"></script>

    <!-- how the client will communicate with the server -->
    <script src="fancywebsocket.js"></script>

    <script>
      var Main;

      function log( text ) {
        $log = $('#log');
        $log.append(($log.val()?"\n":'')+text);
        $log[0].scrollTop = $log[0].scrollHeight - $log[0].clientHeight;
      }

      function send( text ) {
        Server.send( 'message', text );
      }

      function connect(){
        log('Breeding snakes...');
        Server = new FancyWebSocket('ws://' + document.getElementById('ip').value + ':' + document.getElementById('port').value);

        $('#message').keypress(function(e) {
          if ( e.keyCode == 13 && this.value ) {
            log( 'You: ' + this.value );
            send( this.value );
            $(this).val('');
          }
        });

        Server.bind('open', function() {
          document.getElementById("cntBtn").disabled = true;
          log( "Snakes laid eggs." );
        });

        Server.bind('close', function( data ) {
          document.getElementById("cntBtn").disabled = false;
          log( "R.I.P. Snakes 2k16" );
          running = false;
        });

        Server.bind('message', function( payload )
        {
          if (payload == "Start")
          {
            running = true;
            Server.send('message', "ID: " + document.getElementById('id').value);
          }

          else if (payload == "End")
          {
            running = false;
          }

          else if (payload.split(": ")[1] == "Pause")
          {
            running = false;
          }

          else if(payload.split(": ")[1] == "Snake 1 Tail")
          {
            var tail = snake.remove();
            snake.insert(parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
            snake.direction = parseInt(payload.split(": ")[3]);
            grid.set(EMPTY, tail.x, tail.y);
            grid.set(SNAKE, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
          }

          else if(payload.split(": ")[1] == "Snake 2 Tail")
          {
            var tail2 = snake2.remove();
            snake2.insert(parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
            snake2.direction = parseInt(payload.split(": ")[3]);
            grid.set(EMPTY, tail2.x, tail2.y);
            grid.set(SNAKE2, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
          }

          else if (payload.split(": ")[1] == "Snake 1 Child")
          {
            grid.set(SNAKE, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
          }

          else if (payload.split(": ")[1] == "Snake 2 Child")
          {
            grid.set(SNAKE2, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
          }

          else if (payload.split(": ")[1] == "ID")
          {
            clientid = payload.split(": ")[0].split(" ")[1];
            if (clientid == "0")
            {
              id1 = document.getElementById('id').value;
              send("Name 1: " + id1);
            }
            else
            {
              id2 = document.getElementById('id').value;
              send("Name 2: " + id2);
            }
            Main = new main();
            return;
          }

          else if (payload.split(": ")[1] == "Name 1")
          {
            id1 = payload.split(": ")[2];
            return;
          }

          else if (payload.split(": ")[1] == "Name 2")
          {
            id2 = payload.split(": ")[2];
            return;
          }

          else if (payload.split(": ")[1] == "Initial Pickup")
          {
            grid.set(PICKUP, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
          }

          else if (payload.split(": ")[1] == "Pickup")
          {
            var current = Date.now();
            var split_message = payload.split(": ");
            if (split_message.length > 1)
            {
              log("Message Type: " + split_message[1] + "| Latency: " + (current - parseInt(split_message[split_message.length - 1])) + " milliseconds.");
            }

            grid.set(PICKUP, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
            if (clientid != payload.split(": ")[0].split(" ")[1])
            {
              var tw = canvas.width / grid.width;
              var th = canvas.height / grid.height;
              if (payload.split(": ")[3] == "" + SNAKE)
              {
                ctx.fillStyle = "#0000FF";
                var tail = {x:snake.last.x, y:snake.last.y};
                if (snake.direction == LEFT) { snake.insert(tail.x - 1, tail.y); grid.set(SNAKE, tail.x - 1, tail.y); ctx.fillRect((tail.x-1) * tw, (tail.y) * th, tw, th); }
                else if (snake.direction == RIGHT) { snake.insert(tail.x + 1, tail.y); grid.set(SNAKE, tail.x + 1, tail.y); ctx.fillRect((tail.x+1) * tw, tail.y * th, tw, th); }
                else if (snake.direction == UP) { snake.insert(tail.x, tail.y - 1); grid.set(SNAKE, tail.x, tail.y - 1); ctx.fillRect((tail.x) * tw, (tail.y - 1) * th, tw, th); }
                else if (snake.direction == DOWN) { snake.insert(tail.x, tail.y + 1); grid.set(SNAKE, tail.x, tail.y + 1); ctx.fillRect((tail.x) * tw, (tail.y + 1) * th, tw, th); }
              }
              else
              {
                ctx.fillStyle = "#FF0000";
                var tail = {x: snake2.last.x, y: snake2.last.y};
                if (snake2.direction == LEFT) { snake2.insert(tail.x - 1, tail.y); grid.set(SNAKE2, tail.x - 1, tail.y); ctx.fillRect((tail.x - 1) * tw, (tail.y) * th, tw, th); }
                else if (snake2.direction == RIGHT) { snake2.insert(tail.x + 1, tail.y); grid.set(SNAKE2, tail.x + 1, tail.y); ctx.fillRect((tail.x + 1) * tw, (tail.y) * th, tw, th); }
                else if (snake2.direction == UP) { snake2.insert(tail.x, tail.y - 1); grid.set(SNAKE2, tail.x, tail.y - 1); ctx.fillRect((tail.x) * tw, (tail.y - 1) * th, tw, th); }
                else if (snake2.direction == DOWN) { snake2.insert(tail.x, tail.y + 1); grid.set(SNAKE2, tail.x, tail.y + 1); ctx.fillRect((tail.x) * tw, (tail.y + 1) * th, tw, th); }
              }
            }
          }

          else if (payload.split(": ")[1] == "Empty")
          {
            grid.set(EMPTY, parseInt(payload.split(": ")[2].split(", ")[0]), parseInt(payload.split(": ")[2].split(", ")[1]));
          }

          else if (payload.split(": ")[1] == "Player " + id1 + " Score")
          {
            p1score = parseInt(payload.split(": ")[2]);
            document.getElementById("p1score").innerHTML = "Player " + id1 + " Score: " + p1score;
          }

          else if (payload.split(": ")[1] == "Player "+ id2 +" Score")
          {
            p2score = parseInt(payload.split(": ")[2]);
            document.getElementById("p2score").innerHTML = "Player " + id2 + " Score: " + p2score;
          }

          else if (payload.split(": ")[1] == "Player "+ id1 +" Wins")
          {
            p1wins = parseInt(payload.split(": ")[2]);
            document.getElementById("p1wins").innerHTML = "Player "+ id1 +" Wins: " + p1wins;
          }

          else if (payload.split(": ")[1] == "Player "+ id2 +" Wins")
          {
            p2wins = parseInt(payload.split(": ")[2]);
            document.getElementById("p2wins").innerHTML = "Player "+ id2 +" Wins: " + p2wins;
          }

          else if (payload.split(": ")[1] == "Ties")
          {
            ties = parseInt(payload.split(": ")[2]);
            document.getElementById("ties").innerHTML = "Ties: " + ties;
          }

          else if (payload.split(": ")[1] == "Reset")
          {
            running = true;
            init();
            loop();
          }

          else
          {
            log( payload );
          }
        });

        Server.connect();
      }
    </script>
  </head>

  <body class="page-body">
    <div id="navbar-placeholder"></div>
    <script src="../../js/components.js"></script>

    <div class="container my-4">
      <div class="card text-white bg-dark">
        <div class="card-body">
          <h1 class="card-title display-4">Multiplayer Snake</h1>
          <p class="lead lead-white">Networked multiplayer snake game using WebSockets.</p>
          <hr class="my-4 hr-white">

          <div class="snake-controls text-center">
            <div class="mb-3">
              <label>IP:</label> <input type="text" id="ip" name="ip">
              <label class="ml-3">Port:</label> <input type="text" id="port" name="port">
              <label class="ml-3">ID:</label> <input type="text" id="id" name="id">
            </div>
            <textarea id="log" name="log" readonly="readonly" class="mb-2"></textarea><br>
            <button type="button" class="btn btn-outline-light mr-2 mb-2" id="cntBtn" onclick="connect();">Connect</button>
            <button type="button" class="btn btn-outline-light mr-2 mb-2" id="startBtn" onclick="start();">Start Round</button>

            <table class="mt-3">
              <tr>
                <td id="p1score"></td>
                <td id="p2score"></td>
                <td id="p1wins"></td>
                <td id="p2wins"></td>
                <td id="ties"></td>
              </tr>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>
    <script>loadCommonScripts();</script>
  </body>
</html>
