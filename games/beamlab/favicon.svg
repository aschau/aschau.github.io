<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0a0e17"/>
  <!-- 4x4 grid, cells 6px, origin 4,4 -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="4" y1="16" x2="28" y2="16" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="10" y1="4" x2="10" y2="28" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="16" y1="4" x2="16" y2="28" stroke="#1a1f2e" stroke-width="1"/>
  <line x1="22" y1="4" x2="22" y2="28" stroke="#1a1f2e" stroke-width="1"/>
  <rect x="4" y="4" width="24" height="24" rx="1" fill="none" stroke="#1a1f2e" stroke-width="1.5"/>
  <!-- Beam path: starts from grid edge at col1, down to row4, right to col4, up to grid edge -->
  <line x1="7" y1="4" x2="7" y2="25" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="7" y1="25" x2="25" y2="25" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="25" y1="25" x2="25" y2="4" stroke="#00e5ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Mirror 1: cell (row4, col1) — bck mirror \ -->
  <line x1="4.5" y1="22.5" x2="9.5" y2="27.5" stroke="#f0c050" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mirror 2: cell (row4, col4) — fwd mirror / -->
  <line x1="22.5" y1="27.5" x2="27.5" y2="22.5" stroke="#f0c050" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Source on top edge at col1, on top of laser -->
  <rect x="5" y="2.5" width="4" height="2" rx="1" fill="#2ea043"/>
  <!-- Target on top edge at col4, on top of laser -->
  <rect x="23" y="2.5" width="4" height="2" rx="1" fill="#ff3d71"/>
</svg>
